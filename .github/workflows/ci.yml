name: CI — Build, Test, Scan, Push

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "9.0.x"
  NODE_VERSION: "20.x"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Backend build + test ──────────────────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: platformapp_test
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform_test_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore backend/services/platform-app/src/PlatformApp.Api/PlatformApp.Api.csproj

      - name: Build
        run: dotnet build backend/services/platform-app/src/PlatformApp.Api/PlatformApp.Api.csproj
             --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/PlatformApp.Domain.Tests/PlatformApp.Domain.Tests.csproj
             --no-build --configuration Release --logger "trx;LogFileName=unit.trx"
             --collect:"XPlat Code Coverage"
        env:
          ASPNETCORE_ENVIRONMENT: Test

      - name: Run loyalty tests
        run: dotnet test tests/PlatformApp.Loyalty.Tests/PlatformApp.Loyalty.Tests.csproj
             --configuration Release --logger "trx;LogFileName=loyalty.trx"
             --collect:"XPlat Code Coverage"

      - name: Run integration tests
        run: dotnet test tests/PlatformApp.Api.ContractTests/PlatformApp.Api.ContractTests.csproj
             --configuration Release --logger "trx;LogFileName=integration.trx"
        env:
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=platformapp_test;Username=platform;Password=platform_test_pw"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: "**/coverage.cobertura.xml"

  # ── Frontend build + lint ─────────────────────────────────────────────────────
  frontend:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/web-app/package-lock.json

      - name: Install dependencies
        working-directory: frontend/web-app
        run: npm ci

      - name: Lint
        working-directory: frontend/web-app
        run: npm run lint

      - name: Build
        working-directory: frontend/web-app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/web-app/dist

  # ── SAST security scan ────────────────────────────────────────────────────────
  sast:
    name: Security — SAST Scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/csharp
            p/javascript
            p/typescript
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ── Docker build + push (main branch only) ────────────────────────────────────
  docker:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [backend, frontend, sast]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/platform-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: backend/services/platform-app
          file: backend/services/platform-app/src/PlatformApp.Api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/platform-web
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend/web-app
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to dev (main branch only) ─────────────────────────────────────────
  deploy-dev:
    name: Deploy — Dev Environment
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_DEV }}

      - name: Deploy to dev namespace
        run: |
          kubectl apply -f infra/k8s/platform-app-api/configmap.yaml -n dev
          kubectl apply -f infra/k8s/platform-app-api/secret.yaml    -n dev
          kubectl apply -f infra/k8s/platform-app-api/deployment.yaml -n dev
          kubectl apply -f infra/k8s/platform-app-api/service.yaml    -n dev
          kubectl apply -f infra/k8s/platform-app-api/hpa.yaml        -n dev
          kubectl rollout status deployment/platform-api -n dev --timeout=120s
