apiVersion: v2
name: platform-app
description: Helm chart for the eShop-modernized PlatformApp (API + Web + dependencies)
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - eshop
  - dotnet
  - react
  - clean-architecture
maintainers:
  - name: Platform Team
dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "20.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: rabbitmq
    version: "15.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: rabbitmq.enabled
