apiVersion: v1
kind: Secret
metadata:
  name: platform-api-secrets
  namespace: platform
  labels:
    app: platform-api
    component: backend
  annotations:
    # Secrets should be managed by Sealed Secrets or External Secrets Operator in production.
    # Never commit real secret values — this file holds placeholder structure only.
    sealedsecrets.bitnami.com/managed: "true"
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_WITH_SEALED_SECRET"
  JWT_SIGNING_KEY: "REPLACE_WITH_SEALED_SECRET_MIN_32_CHARS"
