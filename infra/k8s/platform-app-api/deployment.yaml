apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-app-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-app-api
  template:
    metadata:
      labels:
        app: platform-app-api
    spec:
      containers:
        - name: api
          image: platform-app-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
          readinessProbe:
            httpGet:
              path: /api_health_check
              port: 8080
          livenessProbe:
            httpGet:
              path: /home_page_health_check
              port: 8080
