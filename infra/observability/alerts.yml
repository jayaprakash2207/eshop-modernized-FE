groups:
  - name: platform-api-alerts
    rules:
      - alert: HighErrorRate
        expr: sum(rate(http_requests_received_total{code=~"5.."}[5m])) / sum(rate(http_requests_received_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on platform-api"
          description: "5xx error ratio above 5% for 5 minutes."

      - alert: HighLatencyP99
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p99 latency above 200ms"
          description: "API p99 latency exceeded the 200ms SLO for 5 minutes."

      - alert: ApiDown
        expr: up{job="platform-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "platform-api is down"
          description: "Prometheus cannot scrape platform-api."
